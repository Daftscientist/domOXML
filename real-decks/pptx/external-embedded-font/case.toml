id = "external-embedded-font"
pptx_file = "source.pptx"

[provenance]
source_url = "https://github.com/aiden0z/pptx-renderer/blob/68cb570940fb28d5c4628f31d1365016c4483521/docs/example/embedded-font/source.pptx"
source_revision = "68cb570940fb28d5c4628f31d1365016c4483521"
license = "Apache-2.0"
sha256 = "2b8668b0bc07da26008daf1804b3343413176b9fd42d1f7bfbef01ca4772c3de"

[package]
slides = 1
required_parts = [
  "ppt/slides/slide1.xml",
  "ppt/fonts/BeVietnamPro-regular.fntdata",
  "ppt/fonts/BeVietnamPro-bold.fntdata",
  "ppt/media/image1.png",
]

[reverse]
min_representation = { native = 10 }
max_representation = { native = 10, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 10 }
max_editability = { semantic = 10, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 10 }
max_source_retention = { not_required = 10, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 10
max_output_count = 10
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0
min_assets = 1
max_warnings = 2
warning_contains = [
  "Be Vietnam Pro' (regular): invalid magic bytes",
  "Be Vietnam Pro' (bold): invalid magic bytes",
]
preserved_count = 0
html_contains = ["Be Vietnam Pro", "background-position"]
roundtrip_xml_contains = [
  "Embedded font from the PPTX",
  '<a:srcRect r="66667"/>',
  '<a:srcRect l="33333" r="33333"/>',
  '<a:srcRect l="66667"/>',
]

[[visual]]
slide = 0
# Distro LibreOffice repositions the malformed-font deck's editable text. Exact crop XML above
# and the global floor carry the semantic gate; regional similarity guards gross regressions.
min_similarity = 0.978
min_regional_similarity = 0.89
min_focused_similarity = 0.97
