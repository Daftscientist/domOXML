id = "external-chart-preservation"
pptx_file = "source.pptx"
[provenance]
source_url = "https://github.com/aiden0z/pptx-renderer/blob/68cb570940fb28d5c4628f31d1365016c4483521/docs/example/1-chart-and-complex/source.pptx"
source_revision = "68cb570940fb28d5c4628f31d1365016c4483521"
license = "Apache-2.0"
sha256 = "cab6e57b7632a69451e41baa5c7171b005dfa10bfc4f640401e1bec3872dc39c"

[package]
slides = 2
required_parts = [
  "ppt/slides/slide1.xml",
  "ppt/slides/slide2.xml",
  "ppt/charts/chart1.xml",
  "ppt/charts/style1.xml",
  "ppt/charts/colors1.xml",
  "ppt/theme/theme1.xml",
]

[reverse]
min_representation = { native = 79, element_layer = 1 }
max_representation = { native = 79, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 1, failed = 0 }
min_editability = { semantic = 79, layers = 1 }
max_editability = { semantic = 79, components = 0, layers = 1, none = 0 }
min_source_retention = { not_required = 79, attached = 1 }
max_source_retention = { not_required = 79, attached = 1, detached = 0, ignored = 0, lost = 0 }
min_output_count = 80
max_output_count = 80
min_raster_area_emu2 = 51092518782500
max_raster_area_emu2 = 51092518782500
min_assets = 2
max_warnings = 1
warning_contains = ["graphicFrame (chart/table/unsupported graphic)"]
preserved_count = 1
html_contains = ["OpenTelemetry", ">2</span>"]
roundtrip_xml_contains = ["OpenTelemetry", "Series 1", "Category 4", "E1251B"]
roundtrip_required_parts = [
  "ppt/charts/chart1.xml",
  "ppt/charts/style1.xml",
  "ppt/charts/colors1.xml",
  "ppt/embeddings/Microsoft_Excel_Worksheet.xlsx",
]

[[reverse.preserved]]
part = "ppt/slides/slide2.xml"
kind = "graphicFrame"
xml_contains = "http://schemas.openxmlformats.org/drawingml/2006/chart"

[[visual]]
slide = 1
min_similarity = 0.99
min_regional_similarity = 0.95
min_structural_similarity = 0.96
