<div style="position:relative;width:1280px;height:720px;background:#f8fafc;font-family:sans-serif">
  <!-- Card 1: rotate(15deg) — solid fill with text (→ a:xfrm rot) -->
  <div style="position:absolute;left:160px;top:200px;width:320px;height:200px;
    background:#4f46e5;border-radius:12px;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600;
    transform:rotate(15deg)">
    Rotated card 15°
  </div>
  <!-- Card 2: scaleX(-1) flip — solid fill with text (→ a:xfrm flipH) -->
  <div style="position:absolute;left:800px;top:200px;width:320px;height:200px;
    background:#0ea5e9;border-radius:12px;
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600;
    transform:scaleX(-1)">
    Flipped card H
  </div>
</div>
