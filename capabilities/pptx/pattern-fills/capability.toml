id = "pattern-fills"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 3 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }

# Card 1: thin 45deg stripes -> a:pattFill (ltUpDiag)
# Card 2: wide horizontal stripes -> a:pattFill (horz)
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:pattFill"
min_count = 2

# Card 3: background-size:cover photo -> a:blipFill with a crop window
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:blipFill/a:srcRect"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.94
source_to_pptx_min_regional_similarity = 0.935
source_to_pptx_min_structural_similarity = 0.95
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[reverse]
html_contains = [
  "background:repeating-linear-gradient(45deg,rgb(30,58,138)",
  "background:repeating-linear-gradient(0deg,rgb(22,101,52)",
  "background-image:url(../assets/",
  "background-size:150.0015% 100%",
]
