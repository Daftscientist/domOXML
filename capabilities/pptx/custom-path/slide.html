<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { margin: 0; padding: 0; }
  .slide { position: relative; width: 1280px; height: 720px; background: white; }
</style>
</head>
<body>
<div class="slide">
  <!-- Element 1: Custom path shape (lens/oval with cubic bezier curves) -->
  <div style="position:absolute;left:100px;top:100px;width:200px;height:100px;">
    <svg viewBox="0 0 200 100" width="200" height="100" xmlns="http://www.w3.org/2000/svg">
      <path d="M 10 50 C 10 10 190 10 190 50 C 190 90 10 90 10 50 Z"
            fill="#4472C4" stroke="#1F4E79" stroke-width="4"/>
    </svg>
  </div>

  <!-- Element 2: Horizontal rule acting as a connector / divider line -->
  <hr style="position:absolute;left:50px;top:280px;width:600px;border:none;border-top:2px solid #666;margin:0;">
</div>
</body>
</html>
