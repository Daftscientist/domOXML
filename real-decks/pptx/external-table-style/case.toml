  "<table",
  "Wide table cell remains visible",
  "rgba(79,129,189,1)",
  "rgba(208,216,232,1)",
]
roundtrip_xml_contains = [
  "Wide table cell remains visible",
  "B1",
  "A2",
  "B2",
  'sz="1800"',
  'typeface="Calibri"',
  'wrap="square"',
  'firstRow="1"',
