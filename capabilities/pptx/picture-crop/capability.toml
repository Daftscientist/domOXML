id = "picture-crop"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 1 }
max_representation = { rasterized = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 3 }
max_editability = { semantic = 3, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 3 }
max_source_retention = { not_required = 3, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 3
max_output_count = 3
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# Pure bitmap nodes use interoperable native pictures (p:pic/p:blipFill).
xpath = ".//p:pic/p:blipFill"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# a:srcRect must exist somewhere in the slide shapes tree.
xpath = ".//a:srcRect"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.96
source_to_pptx_min_regional_similarity = 0.90
source_to_pptx_min_structural_similarity = 0.98
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[roundtrip]
