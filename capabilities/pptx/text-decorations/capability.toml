id = "text-decorations"
direction = "both"
html_file = "slide.html"

[expected]
min_native = 1
max_raster = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@u='sng']"
min_count = 2

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@strike='sngStrike']"
min_count = 2

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@cap='all']"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@cap='small']"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@spc]"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.97
source_to_pptx_min_regional_similarity = 0.94
source_to_pptx_min_structural_similarity = 0.92
pptx_to_html_min_similarity = 0.99
pptx_to_html_min_regional_similarity = 0.955
pptx_to_html_min_structural_similarity = 0.96

[reverse]
html_contains = [
  "text-decoration-line:underline",
  "text-decoration-line:line-through",
  "text-transform:uppercase",
  "font-variant-caps:small-caps",
  "letter-spacing:1.5pt",
]
