min_output_count = 5
max_output_count = 5
min_raster_area_emu2 = 5806440000000
max_raster_area_emu2 = 5806440000000
warnings = ["LibreOffice ignores a:innerShdw"]

# Shadowed card: calibrated blur plus exact sx/sy grow attrs derived from the shape dimensions.
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:outerShdw[@blurRad='171450' and @sx='103750' and @sy='106000']"
min_count = 1

# Inset shadow card: raster fallback because LibreOffice ignores a:innerShdw
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//p:pic/p:blipFill"
min_count = 1

# Glow halo card: zero-offset CSS shadow maps to the calibrated native glow radius.
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:glow[@rad='323850']"
min_count = 1

