[visual]
source_to_pptx_min_similarity = 0.98
source_to_pptx_min_regional_similarity = 0.95
source_to_pptx_min_structural_similarity = 0.94
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[roundtrip]
cycles = 2
min_representation = { native = 9 }
max_representation = { native = 9, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 9 }
max_editability = { semantic = 9, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 9 }
max_source_retention = { not_required = 9, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 9
max_output_count = 9
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0
min_convergence_similarity = 0.999
min_convergence_regional_similarity = 0.999
min_convergence_structural_similarity = 0.999

[reverse]
html_contains = [
  "clip-path:polygon(0% 100%,100% 100%,50% 0%)",
  "clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%)",
  "clip-path:polygon(25% 0%,75% 0%,100% 50%,75% 100%,25% 100%,0% 50%)",
  "clip-path:polygon(25% 0%,75% 0%,75% 25%,100% 25%",
]
