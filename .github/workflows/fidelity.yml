name: Fidelity

on:
  pull_request:
    paths:
      - "domoxml/core/ir/**"
      - "domoxml/core/drawingml/**"
      - "domoxml/slides/**"
      - "domoxml/core/render/**"
      - "domoxml/core/fidelity/**"
      - "domoxml/core/capabilities.py"
      - "capabilities/pptx/**"
      - "fidelity/corpus/**"
      - "scripts/capability_check.py"
      - "scripts/fidelity_check.py"
      - ".github/workflows/fidelity.yml"
  workflow_dispatch:

jobs:
  fidelity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libreoffice-impress poppler-utils
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - name: Install (venv + dev extras)
        run: |
          uv venv
          uv pip install -e ".[dev]"
      - name: Install Chromium
        run: uv run playwright install --with-deps chromium
      - name: Run fidelity checker (LibreOffice)
        id: fidelity
        run: >-
          uv run python scripts/fidelity_check.py
          --backend libreoffice
          --require-backend
          --heatmap
      - name: Run forward and reverse capability fixtures
        if: always()
        id: capabilities
        run: >-
          uv run python scripts/capability_check.py
          --require-backend
          --out out/capabilities
      - name: Upload fidelity artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: fidelity-report-${{ github.run_id }}
          path: |
            out/fidelity/**
            out/capabilities/**
      - name: Build fidelity summary
        if: always()
        id: summary
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FIDELITY_OUTCOME: ${{ steps.fidelity.outcome }}
          CAPABILITY_OUTCOME: ${{ steps.capabilities.outcome }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          report = Path("out/fidelity/summary.md")
          text = report.read_text() if report.exists() else "# Fidelity report\n\nNo report was produced.\n"
          text += f"\n- Fidelity outcome: {os.environ['FIDELITY_OUTCOME']}\n"
          text += f"- Capability outcome: {os.environ['CAPABILITY_OUTCOME']}\n"
          text += f"- Artifacts and logs: {os.environ['RUN_URL']}\n"
          Path(os.environ["GITHUB_STEP_SUMMARY"]).write_text(text)
          with Path(os.environ["GITHUB_OUTPUT"]).open("a") as fh:
              fh.write("comment<<EOF\n")
              fh.write(text)
              fh.write("\nEOF\n")
          PY
      - name: Sticky PR comment
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: fidelity-report
          message: ${{ steps.summary.outputs.comment }}
