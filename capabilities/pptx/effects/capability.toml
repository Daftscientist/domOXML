id = "effects"
direction = "forward"
html_file = "slide.html"

[expected]
min_representation = { native = 2, element_layer = 1 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 1, failed = 0 }
warnings = ["LibreOffice ignores a:innerShdw"]

# Shadowed card: box-shadow with offset+blur+spread → outerShdw with sx/sy grow attrs
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:outerShdw[@sx]"
min_count = 1

# Inset shadow card: raster fallback because LibreOffice ignores a:innerShdw
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//p:pic/p:blipFill"
min_count = 1

# Glow halo card: zero-offset box-shadow → a:glow (preferred) or outerShdw
[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:glow | .//a:outerShdw[@dist='0']"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.98
source_to_pptx_min_regional_similarity = 0.975
source_to_pptx_min_structural_similarity = 0.97
