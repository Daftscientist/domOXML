id = "transforms"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 2 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 4 }
max_editability = { semantic = 4, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 4 }
max_source_retention = { not_required = 4, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 4
max_output_count = 4
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:xfrm[@rot]"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:xfrm[@flipH or @flipV]"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.98
source_to_pptx_min_regional_similarity = 0.95
source_to_pptx_min_structural_similarity = 0.95
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[roundtrip]
cycles = 2
min_representation = { native = 4 }
max_representation = { native = 4, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 4 }
max_editability = { semantic = 4, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 4 }
max_source_retention = { not_required = 4, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 4
max_output_count = 4
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0
min_convergence_similarity = 0.999
min_convergence_regional_similarity = 0.999
min_convergence_structural_similarity = 0.999

[reverse]
html_contains = [
  "transform:rotate(15deg)",
  "transform:scaleX(-1)",
  "clip-path:polygon(0% 25%,50% 25%,50% 0%,100% 50%",
]
