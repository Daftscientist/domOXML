id = "svg-vector"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 1 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# Pure bitmap nodes use interoperable native pictures (p:pic/p:blipFill).
xpath = ".//p:pic/p:blipFill"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# The vector is preserved via the Office 2016 asvg:svgBlip extension.
xpath = ".//asvg:svgBlip"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.99
source_to_pptx_min_regional_similarity = 0.98
source_to_pptx_min_structural_similarity = 0.97
pptx_to_html_min_similarity = 0.99
pptx_to_html_min_regional_similarity = 0.98
pptx_to_html_min_structural_similarity = 0.97

[reverse]
expected_slides = 1
html_contains = [".svg", "data-domoxml-source-format=\"html\""]
max_warnings = 0
max_preserved = 0
