<div style="position:relative;width:1280px;height:720px;background:#f8fafc;font-family:sans-serif">
  <!-- Card 1: offset shadow with spread (→ outerShdw with sx/sy) -->
  <div style="position:absolute;left:80px;top:160px;width:320px;height:200px;
    background:#4f46e5;border-radius:12px;
    box-shadow:8px 12px 24px 6px rgba(0,0,0,0.35);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600">
    Offset shadow + spread
  </div>
  <!-- Card 2: inset shadow (→ innerShdw) -->
  <div style="position:absolute;left:480px;top:160px;width:320px;height:200px;
    background:#f1f5f9;border-radius:12px;border:1px solid #e2e8f0;
    box-shadow:inset 4px 4px 12px 2px rgba(0,0,0,0.25);
    color:#1e293b;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600">
    Inset shadow
  </div>
  <!-- Card 3: zero-offset glow halo (→ a:glow) -->
  <div style="position:absolute;left:880px;top:160px;width:320px;height:200px;
    background:#0ea5e9;border-radius:12px;
    box-shadow:0px 0px 32px 8px rgba(14,165,233,0.7);
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-size:18px;font-weight:600">
    Glow halo
  </div>
</div>
