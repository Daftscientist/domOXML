id = "text-decorations"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 1 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 8 }
max_editability = { semantic = 8, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 8 }
max_source_retention = { not_required = 8, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 8
max_output_count = 8
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@u='sng']"
min_count = 2

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@strike='sngStrike']"
min_count = 2

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@cap='all']"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@cap='small']"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:rPr[@spc]"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.97
source_to_pptx_min_regional_similarity = 0.94
source_to_pptx_min_structural_similarity = 0.92
pptx_to_html_min_similarity = 0.99
pptx_to_html_min_regional_similarity = 0.955
pptx_to_html_min_structural_similarity = 0.96

[roundtrip]
cycles = 2
min_representation = { native = 2 }
max_representation = { native = 2, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 2 }
max_editability = { semantic = 2, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 2 }
max_source_retention = { not_required = 2, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 2
max_output_count = 2
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0
min_convergence_similarity = 0.999
min_convergence_regional_similarity = 0.999
min_convergence_structural_similarity = 0.999

[reverse]
html_contains = [
  "text-decoration-line:underline",
  "text-decoration-line:line-through",
  "text-transform:uppercase",
  "font-variant-caps:small-caps",
  "letter-spacing:1.5pt",
]
