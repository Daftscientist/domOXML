id = "picture-crop"
direction = "both"
html_file = "slide.html"

[expected]
min_native = 1
max_raster = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# Pure bitmap nodes use interoperable native pictures (p:pic/p:blipFill).
xpath = ".//p:pic/p:blipFill"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# a:srcRect must exist somewhere in the slide shapes tree.
xpath = ".//a:srcRect"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.96
source_to_pptx_min_regional_similarity = 0.90
source_to_pptx_min_structural_similarity = 0.98
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[reverse]
html_contains = [
  "background-image:url(../assets/",
  "background-size:200% 100%",
  "background-position:50% 50%",
  "background-repeat:no-repeat",
]
