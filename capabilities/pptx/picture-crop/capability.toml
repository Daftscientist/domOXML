id = "picture-crop"
direction = "forward"
html_file = "slide.html"

[expected]
min_native = 1
max_raster = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# domOXML emits images as a shape blip fill (p:sp/a:blipFill), not p:pic.
xpath = ".//a:blipFill"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
# a:srcRect must exist somewhere in the slide shapes tree.
xpath = ".//a:srcRect"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.96
source_to_pptx_min_regional_similarity = 0.94
