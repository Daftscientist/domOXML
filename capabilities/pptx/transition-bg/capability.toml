id = "transition-bg"
direction = "both"
html_file = "slide.html"

[expected]
min_representation = { native = 1 }
max_representation = { approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 1 }
max_editability = { semantic = 1, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 1 }
max_source_retention = { not_required = 1, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 1
max_output_count = 1
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//p:transition"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//p:bg"
min_count = 1

[visual]
source_to_pptx_min_similarity = 0.98
source_to_pptx_min_regional_similarity = 0.955
source_to_pptx_min_structural_similarity = 0.95
pptx_to_html_min_similarity = 0.995
pptx_to_html_min_regional_similarity = 0.99
pptx_to_html_min_structural_similarity = 0.99

[roundtrip]
