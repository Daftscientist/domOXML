id = "table"
direction = "both"
html_file = "slide.html"

[expected]
# Table nodes live in slide.nodes, not slide.shapes, so min_native/max_raster
# do not apply here (they count shapes from extract_slide).
min_native = 0
max_raster = 0

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//p:graphicFrame"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:tbl"
min_count = 1

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:tblGrid/a:gridCol"
min_count = 2

[[expected.xml]]
part = "ppt/slides/slide1.xml"
xpath = ".//a:tr"
min_count = 2

[visual]
source_to_pptx_min_similarity = 0.98
source_to_pptx_min_regional_similarity = 0.97
pptx_to_html_min_similarity = 0.99
pptx_to_html_min_regional_similarity = 0.98

[reverse]
html_contains = ["<table ", "<colgroup>", "Name", "Alice", "background-color:rgba(68,114,196,1)"]
