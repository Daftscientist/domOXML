min_representation = { native = 1 }
max_representation = { native = 1, decomposed = 0, approximated = 0, hybrid = 0, layered = 0, element_layer = 0, failed = 0 }
min_editability = { semantic = 1 }
max_editability = { semantic = 1, components = 0, layers = 0, none = 0 }
min_source_retention = { not_required = 1 }
max_source_retention = { not_required = 1, attached = 0, detached = 0, ignored = 0, lost = 0 }
min_output_count = 1
max_output_count = 1
min_raster_area_emu2 = 0
max_raster_area_emu2 = 0
min_convergence_similarity = 0.999
min_convergence_regional_similarity = 0.999
min_convergence_structural_similarity = 0.999

[reverse]
html_contains = [
  'data-transition="fade"',
  'data-transition-duration="500"',
  "background-image:linear-gradient(135deg,rgba(102,126,234,1) 0%,rgba(118,75,162,1) 100%)",
]
